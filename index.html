<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Project Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #f5f0e8;
    --paper2: #ede7d8;
    --accent: #c84b31;
    --accent2: #2d6a4f;
    --accent3: #e9a825;
    --muted: #8a8070;
    --card: #faf7f2;
    --border: #d4cab8;
    --shadow: rgba(26,26,46,0.12);
    --tab-h: 52px;
    --bottom-h: 72px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--paper);
    color: var(--ink);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── TOP HEADER ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--ink);
    padding: 14px 18px 10px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px; color: var(--paper);
    letter-spacing: 0.02em;
  }
  .header-date {
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-top: 2px;
  }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--paper); width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px; font-size: 18px;
    transition: background 0.15s;
  }
  .icon-btn:active { background: rgba(255,255,255,0.12); }

  /* ── TABS ── */
  .tabs-wrapper {
    position: sticky; top: 62px; z-index: 99;
    background: var(--ink);
    border-bottom: 2px solid var(--border);
  }
  .tabs-scroll {
    display: flex; overflow-x: auto; gap: 0;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabs-scroll::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 0 16px;
    height: var(--tab-h);
    display: flex; align-items: center; gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted);
    background: none; border: none; cursor: pointer;
    position: relative;
    transition: color 0.2s;
    white-space: nowrap;
  }
  .tab.active { color: var(--paper); }
  .tab.active::after {
    content: ''; position: absolute; bottom: 0; left: 8px; right: 8px;
    height: 2px; background: var(--accent);
    border-radius: 2px 2px 0 0;
  }
  .tab-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor; opacity: 0.6;
  }
  .tab-count {
    font-size: 10px; background: rgba(255,255,255,0.15);
    border-radius: 10px; padding: 1px 6px; color: var(--paper);
    opacity: 0.7;
  }
  .tab-add {
    flex-shrink: 0; padding: 0 16px; height: var(--tab-h);
    display: flex; align-items: center;
    color: var(--accent3); font-size: 20px;
    background: none; border: none; cursor: pointer;
    border-left: 1px solid rgba(255,255,255,0.08);
  }

  /* ── MAIN CONTENT ── */
  .content {
    padding: 16px 16px calc(var(--bottom-h) + 20px);
    min-height: calc(100dvh - 62px - var(--tab-h));
  }

  /* ── SECTION LABELS ── */
  .section-label {
    font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted); margin: 20px 0 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ── PROJECT CARD ── */
  .project-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    box-shadow: 0 2px 8px var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .project-card:active { transform: scale(0.99); }
  .card-header {
    padding: 14px 14px 10px;
    display: flex; align-items: flex-start; gap: 10px;
    cursor: pointer;
  }
  .card-color-bar {
    width: 3px; height: 100%; min-height: 40px;
    border-radius: 2px; flex-shrink: 0; margin-top: 2px;
  }
  .card-main { flex: 1; min-width: 0; }
  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 17px; line-height: 1.25;
    color: var(--ink);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card-meta {
    font-size: 10px; color: var(--muted);
    margin-top: 3px; letter-spacing: 0.06em;
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .card-meta span { display: flex; align-items: center; gap: 3px; }
  .card-chevron {
    flex-shrink: 0; font-size: 16px; color: var(--muted);
    transition: transform 0.2s;
    margin-top: 2px;
  }
  .card-chevron.open { transform: rotate(180deg); }

  /* Progress bar */
  .card-progress-wrap { padding: 0 14px 14px; }
  .progress-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 6px;
  }
  .progress-pct {
    font-size: 11px; font-weight: 500; color: var(--ink);
    min-width: 32px; text-align: right;
  }
  .progress-track {
    flex: 1; height: 6px; background: var(--paper2);
    border-radius: 4px; overflow: hidden;
    cursor: pointer;
  }
  .progress-fill {
    height: 100%; border-radius: 4px;
    transition: width 0.3s ease;
  }

  /* Expanded body */
  .card-body {
    display: none; padding: 0 14px 14px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
    animation: slideDown 0.2s ease;
  }
  .card-body.open { display: block; }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card-desc {
    font-size: 13px; color: #4a4550; line-height: 1.6;
    margin-bottom: 12px;
  }
  .card-dates {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .date-chip {
    font-size: 10px; letter-spacing: 0.06em;
    background: var(--paper2); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 9px;
    color: var(--ink);
  }
  .date-chip.deadline { background: #fdecea; border-color: #f5c6c1; color: var(--accent); }
  .date-chip.start { background: #e8f4ee; border-color: #c2dfc9; color: var(--accent2); }
  .card-actions {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px;
  }
  .card-action-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    border: 1px solid var(--border); background: var(--paper2);
    color: var(--ink); border-radius: 6px;
    padding: 6px 12px; cursor: pointer;
    transition: background 0.15s;
  }
  .card-action-btn:active { background: var(--border); }
  .card-action-btn.danger { color: var(--accent); border-color: #f5c6c1; background: #fdecea; }
  .card-action-btn.success { color: var(--accent2); border-color: #c2dfc9; background: #e8f4ee; }

  /* Slider input */
  .slider-wrap { padding: 10px 0 4px; }
  input[type=range] {
    -webkit-appearance: none; width: 100%; height: 6px;
    background: var(--paper2); border-radius: 4px; outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px;
    background: var(--ink); border-radius: 50%;
    box-shadow: 0 2px 6px var(--shadow);
    cursor: grab;
  }
  input[type=range]::-webkit-slider-thumb:active { cursor: grabbing; }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 44px; margin-bottom: 16px; opacity: 0.4; }
  .empty-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px; color: var(--ink); margin-bottom: 8px; opacity: 0.5;
  }
  .empty-sub { font-size: 12px; line-height: 1.6; opacity: 0.7; }

  /* ── BOTTOM FAB ── */
  .fab {
    position: fixed; bottom: 20px; right: 20px; z-index: 200;
    width: 56px; height: 56px; border-radius: 16px;
    background: var(--accent); border: none; cursor: pointer;
    box-shadow: 0 4px 20px rgba(200,75,49,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; color: white;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .fab:active { transform: scale(0.94); box-shadow: 0 2px 10px rgba(200,75,49,0.3); }

  /* ── MODAL / SHEET ── */
  .overlay {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: rgba(26,26,46,0.5); backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    animation: fadeIn 0.15s ease;
  }
  .overlay.open { display: flex; align-items: flex-end; justify-content: center; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .sheet {
    width: 100%; max-width: 540px;
    background: var(--card);
    border-radius: 20px 20px 0 0;
    padding: 0 0 env(safe-area-inset-bottom, 16px);
    animation: slideUp 0.25s cubic-bezier(0.34,1.08,0.64,1);
    max-height: 92dvh; overflow-y: auto;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .sheet-handle {
    width: 36px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 12px auto 16px;
  }
  .sheet-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px; padding: 0 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sheet-body { padding: 20px; }

  .field { margin-bottom: 18px; }
  label {
    display: block; font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 6px;
  }
  input[type=text], input[type=date], textarea, select {
    width: 100%; font-family: 'DM Mono', monospace;
    font-size: 14px; color: var(--ink);
    background: var(--paper); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 13px;
    outline: none; -webkit-appearance: none; appearance: none;
    transition: border-color 0.2s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--ink); }
  textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

  .color-picker { display: flex; gap: 10px; flex-wrap: wrap; }
  .color-swatch {
    width: 30px; height: 30px; border-radius: 8px; cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
  }
  .color-swatch.selected { border-color: var(--ink); transform: scale(1.15); }

  .sheet-footer {
    padding: 0 20px 16px;
    display: flex; gap: 10px;
  }
  .btn-primary {
    flex: 1; font-family: 'DM Mono', monospace;
    font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
    background: var(--ink); color: var(--paper);
    border: none; border-radius: 10px; padding: 14px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-primary:active { opacity: 0.8; }
  .btn-secondary {
    font-family: 'DM Mono', monospace;
    font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
    background: none; color: var(--muted);
    border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px;
    cursor: pointer;
  }

  /* Tab creation modal */
  .tab-modal {
    max-width: 540px; width: 100%;
    background: var(--card); border-radius: 20px 20px 0 0;
    padding: 20px; animation: slideUp 0.25s cubic-bezier(0.34,1.08,0.64,1);
  }

  /* ── ARCHIVE TOGGLE ── */
  .archive-toggle {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--muted); cursor: pointer;
    padding: 8px 0; letter-spacing: 0.06em;
  }
  .archive-toggle input { accent-color: var(--ink); width: 16px; height: 16px; }

  /* Archived card dim */
  .project-card.archived { opacity: 0.55; }

  /* ── PROGRESS COLORS ── */
  .fill-red { background: var(--accent); }
  .fill-green { background: var(--accent2); }
  .fill-gold { background: var(--accent3); }
  .fill-blue { background: #2980b9; }
  .fill-purple { background: #8e44ad; }
  .fill-teal { background: #16a085; }
  .fill-orange { background: #e67e22; }
  .fill-pink { background: #e91e8c; }

  /* Tab colors */
  .tab-dot-red { background: var(--accent); }
  .tab-dot-green { background: var(--accent2); }
  .tab-dot-gold { background: var(--accent3); }
  .tab-dot-blue { background: #2980b9; }
  .tab-dot-purple { background: #8e44ad; }
  .tab-dot-teal { background: #16a085; }
  .tab-dot-orange { background: #e67e22; }
  .tab-dot-pink { background: #e91e8c; }

  /* Stats row */
  .stats-row {
    display: flex; gap: 8px; margin-bottom: 4px;
  }
  .stat-chip {
    flex: 1; background: var(--paper2);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px; text-align: center;
  }
  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 22px; color: var(--ink);
    display: block;
  }
  .stat-lbl {
    font-size: 9px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    display: block; margin-top: 2px;
  }

  /* ── TAB EDIT ── */
  .tab-edit-icon {
    font-size: 14px; margin-left: 4px; opacity: 0.5;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="header-title">Projects</div>
    <div class="header-date" id="headerDate"></div>
  </div>
  <div class="header-right">
    <button class="icon-btn" onclick="toggleArchiveView()" title="Toggle archived">📦</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs-wrapper">
  <div class="tabs-scroll" id="tabsScroll">
    <!-- dynamically rendered -->
    <button class="tab-add" onclick="openNewTabSheet()" title="New tab">＋</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="content" id="mainContent"></div>

<!-- FAB -->
<button class="fab" onclick="openAddProject()">＋</button>

<!-- ADD/EDIT PROJECT SHEET -->
<div class="overlay" id="projectOverlay" onclick="overlayClose(event, 'projectOverlay')">
  <div class="sheet" id="projectSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">New Project</div>
    <div class="sheet-body">
      <div class="field">
        <label>Project Name</label>
        <input type="text" id="projName" placeholder="Enter project name…" maxlength="60">
      </div>
      <div class="field">
        <label>Description</label>
        <textarea id="projDesc" placeholder="What is this project about?"></textarea>
      </div>
      <div class="field">
        <label>Color</label>
        <div class="color-picker" id="colorPicker">
          <!-- rendered by JS -->
        </div>
      </div>
      <div class="field">
        <label>Initial Progress (%)</label>
        <div class="slider-wrap">
          <div class="progress-row">
            <input type="range" id="projProgress" min="0" max="100" value="0"
              oninput="document.getElementById('projProgressVal').textContent=this.value+'%'">
            <span class="progress-pct" id="projProgressVal">0%</span>
          </div>
        </div>
      </div>
      <div class="field">
        <label>Start Date</label>
        <input type="date" id="projStart">
      </div>
      <div class="field">
        <label>Deadline</label>
        <input type="date" id="projDeadline">
      </div>
      <div class="field">
        <label>Tab</label>
        <select id="projTab"></select>
      </div>
    </div>
    <div class="sheet-footer">
      <button class="btn-secondary" onclick="closeSheet('projectOverlay')">Cancel</button>
      <button class="btn-primary" onclick="saveProject()">Save Project</button>
    </div>
  </div>
</div>

<!-- NEW TAB SHEET -->
<div class="overlay" id="tabOverlay" onclick="overlayClose(event, 'tabOverlay')">
  <div class="sheet tab-modal">
    <div class="sheet-handle"></div>
    <div class="sheet-title">New Tab</div>
    <div class="field" style="padding:0 0 16px">
      <label>Tab Name</label>
      <input type="text" id="newTabName" placeholder="e.g. Writing, Research…" maxlength="24">
    </div>
    <div class="field" style="padding:0 0 16px">
      <label>Color</label>
      <div class="color-picker" id="tabColorPicker"></div>
    </div>
    <div class="sheet-footer" style="padding:0">
      <button class="btn-secondary" onclick="closeSheet('tabOverlay')">Cancel</button>
      <button class="btn-primary" onclick="saveNewTab()">Create Tab</button>
    </div>
  </div>
</div>

<!-- EDIT TAB SHEET -->
<div class="overlay" id="editTabOverlay" onclick="overlayClose(event, 'editTabOverlay')">
  <div class="sheet tab-modal">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Edit Tab</div>
    <div class="field" style="padding:0 0 16px">
      <label>Tab Name</label>
      <input type="text" id="editTabName" placeholder="Tab name…" maxlength="24">
    </div>
    <div class="field" style="padding:0 0 16px">
      <label>Color</label>
      <div class="color-picker" id="editTabColorPicker"></div>
    </div>
    <div class="sheet-footer" style="padding:0; flex-wrap:wrap; gap:8px">
      <button class="btn-secondary" style="color:var(--accent);border-color:#f5c6c1" onclick="deleteTab()">Delete Tab</button>
      <button class="btn-secondary" onclick="closeSheet('editTabOverlay')">Cancel</button>
      <button class="btn-primary" onclick="saveEditTab()">Save</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────
const COLORS = [
  { id:'red',    hex:'#c84b31' },
  { id:'green',  hex:'#2d6a4f' },
  { id:'gold',   hex:'#e9a825' },
  { id:'blue',   hex:'#2980b9' },
  { id:'purple', hex:'#8e44ad' },
  { id:'teal',   hex:'#16a085' },
  { id:'orange', hex:'#e67e22' },
  { id:'pink',   hex:'#e91e8c' },
];

let state = loadState();
let editingProjectId = null;
let editingTabId = null;
let showArchived = false;
let selectedColor = 'blue';
let selectedTabColor = 'teal';
let editTabColorVal = 'teal';

function defaultState() {
  return {
    activeTab: 'general',
    tabs: [
      { id: 'general', name: 'General', color: 'blue' }
    ],
    projects: []
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem('proj_dash_v2');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return defaultState();
}

function saveState() {
  localStorage.setItem('proj_dash_v2', JSON.stringify(state));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

// ─── DATE ───────────────────────────────────────────────
function formatDateDisplay(iso) {
  if (!iso) return null;
  const [y,m,d] = iso.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[+m-1]} ${+d}, ${y}`;
}

function isOverdue(iso) {
  if (!iso) return false;
  return new Date(iso) < new Date(new Date().toDateString());
}

document.getElementById('headerDate').textContent =
  new Date().toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});

// ─── RENDER ─────────────────────────────────────────────
function render() {
  renderTabs();
  renderContent();
}

function renderTabs() {
  const scroll = document.getElementById('tabsScroll');
  // preserve add button
  const addBtn = scroll.querySelector('.tab-add');
  scroll.innerHTML = '';
  state.tabs.forEach(tab => {
    const active = tab.id === state.activeTab;
    const count = state.projects.filter(p => p.tabId === tab.id && !p.archived).length;
    const btn = document.createElement('button');
    btn.className = 'tab' + (active ? ' active' : '');
    btn.innerHTML = `<span class="tab-dot tab-dot-${tab.color}"></span>${tab.name}<span class="tab-count">${count}</span>`;
    if (tab.id !== 'general') {
      const editIcon = document.createElement('span');
      editIcon.className = 'tab-edit-icon';
      editIcon.textContent = '✎';
      editIcon.onclick = (e) => { e.stopPropagation(); openEditTab(tab.id); };
      btn.appendChild(editIcon);
    }
    btn.onclick = () => { state.activeTab = tab.id; saveState(); render(); };
    scroll.insertBefore(btn, null);
  });
  scroll.appendChild(addBtn);
}

function renderContent() {
  const tab = state.tabs.find(t => t.id === state.activeTab);
  if (!tab) return;
  const projects = state.projects.filter(p =>
    p.tabId === state.activeTab && (showArchived ? true : !p.archived)
  );
  const active = projects.filter(p => !p.archived);
  const archived = projects.filter(p => p.archived);

  let html = '';

  // Stats
  if (active.length > 0) {
    const avgProg = active.length ? Math.round(active.reduce((a,p) => a + p.progress, 0) / active.length) : 0;
    const overdue = active.filter(p => p.deadline && isOverdue(p.deadline) && p.progress < 100).length;
    html += `<div class="stats-row">
      <div class="stat-chip"><span class="stat-num">${active.length}</span><span class="stat-lbl">Active</span></div>
      <div class="stat-chip"><span class="stat-num">${avgProg}%</span><span class="stat-lbl">Avg Progress</span></div>
      <div class="stat-chip"><span class="stat-num">${overdue}</span><span class="stat-lbl">Overdue</span></div>
    </div>`;
  }

  if (active.length === 0 && !showArchived) {
    html += `<div class="empty">
      <div class="empty-icon">📋</div>
      <div class="empty-title">No projects yet</div>
      <div class="empty-sub">Tap + to add your first project<br>to the <em>${tab.name}</em> tab.</div>
    </div>`;
  }

  if (active.length > 0) {
    html += `<div class="section-label">Active</div>`;
    active.forEach(p => { html += renderCard(p); });
  }

  if (showArchived && archived.length > 0) {
    html += `<div class="section-label">Archived</div>`;
    archived.forEach(p => { html += renderCard(p); });
  }

  if (!showArchived && archived.length > 0) {
    html += `<label class="archive-toggle" onclick="toggleArchiveView()">
      <input type="checkbox" readonly> Show ${archived.length} archived project${archived.length>1?'s':''}
    </label>`;
  }

  document.getElementById('mainContent').innerHTML = html;

  // Attach slider listeners
  document.querySelectorAll('.prog-slider').forEach(slider => {
    slider.addEventListener('input', function() {
      const id = this.dataset.id;
      const fill = document.getElementById('fill-'+id);
      const pct = document.getElementById('pct-'+id);
      if (fill) fill.style.width = this.value + '%';
      if (pct) pct.textContent = this.value + '%';
    });
    slider.addEventListener('change', function() {
      const id = this.dataset.id;
      const p = state.projects.find(x => x.id === id);
      if (p) { p.progress = +this.value; saveState(); renderTabs(); }
    });
  });
}

function renderCard(p) {
  const color = COLORS.find(c => c.id === p.color) || COLORS[3];
  const overdue = p.deadline && isOverdue(p.deadline) && p.progress < 100;
  return `
  <div class="project-card${p.archived?' archived':''}" id="card-${p.id}">
    <div class="card-header" onclick="toggleCard('${p.id}')">
      <div class="card-color-bar" style="background:${color.hex}"></div>
      <div class="card-main">
        <div class="card-title">${escHtml(p.name)}</div>
        <div class="card-meta">
          ${p.deadline ? `<span>${overdue?'🔴':'📅'} ${formatDateDisplay(p.deadline)}${overdue?' · Overdue':''}</span>` : ''}
          ${p.start ? `<span>🟢 Started ${formatDateDisplay(p.start)}</span>` : ''}
        </div>
      </div>
      <div class="card-chevron" id="chev-${p.id}">▾</div>
    </div>
    <div class="card-progress-wrap">
      <div class="progress-row">
        <div class="progress-track" onclick="handleTrackClick(event,'${p.id}')">
          <div class="progress-fill fill-${p.color}" id="fill-${p.id}" style="width:${p.progress}%"></div>
        </div>
        <div class="progress-pct" id="pct-${p.id}">${p.progress}%</div>
      </div>
    </div>
    <div class="card-body" id="body-${p.id}">
      ${p.desc ? `<div class="card-desc">${escHtml(p.desc).replace(/\n/g,'<br>')}</div>` : ''}
      <div class="card-dates">
        ${p.start ? `<div class="date-chip start">▶ Start: ${formatDateDisplay(p.start)}</div>` : ''}
        ${p.deadline ? `<div class="date-chip deadline${overdue?' overdue':''}">⏳ Due: ${formatDateDisplay(p.deadline)}</div>` : ''}
      </div>
      <div class="slider-wrap" style="margin-bottom:12px">
        <label style="display:block;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Adjust Progress</label>
        <div class="progress-row">
          <input type="range" class="prog-slider" data-id="${p.id}" min="0" max="100" value="${p.progress}">
          <span class="progress-pct" style="pointer-events:none">&nbsp;</span>
        </div>
      </div>
      <div class="card-actions">
        <button class="card-action-btn" onclick="openEditProject('${p.id}')">✎ Edit</button>
        ${!p.archived
          ? `<button class="card-action-btn success" onclick="archiveProject('${p.id}')">📦 Archive</button>`
          : `<button class="card-action-btn" onclick="unarchiveProject('${p.id}')">↩ Restore</button>`
        }
        <button class="card-action-btn danger" onclick="deleteProject('${p.id}')">✕ Delete</button>
      </div>
    </div>
  </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleCard(id) {
  const body = document.getElementById('body-'+id);
  const chev = document.getElementById('chev-'+id);
  if (body) {
    const open = body.classList.toggle('open');
    if (chev) chev.classList.toggle('open', open);
  }
}

function handleTrackClick(e, id) {
  const track = e.currentTarget;
  const rect = track.getBoundingClientRect();
  const pct = Math.round(((e.clientX - rect.left) / rect.width) * 100);
  const p = state.projects.find(x => x.id === id);
  if (p) {
    p.progress = pct;
    saveState();
    const fill = document.getElementById('fill-'+id);
    const pctEl = document.getElementById('pct-'+id);
    if (fill) fill.style.width = pct + '%';
    if (pctEl) pctEl.textContent = pct + '%';
    renderTabs();
  }
}

// ─── ARCHIVE ────────────────────────────────────────────
function archiveProject(id) {
  const p = state.projects.find(x => x.id === id);
  if (p) { p.archived = true; p.progress = 100; saveState(); render(); }
}
function unarchiveProject(id) {
  const p = state.projects.find(x => x.id === id);
  if (p) { p.archived = false; saveState(); render(); }
}
function deleteProject(id) {
  if (!confirm('Delete this project? This cannot be undone.')) return;
  state.projects = state.projects.filter(x => x.id !== id);
  saveState(); render();
}
function toggleArchiveView() {
  showArchived = !showArchived; renderContent();
}

// ─── COLOR PICKER RENDER ─────────────────────────────────
function renderColorPicker(containerId, selectedId, onSelect) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '';
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (c.id === selectedId ? ' selected' : '');
    sw.style.background = c.hex;
    sw.onclick = () => {
      el.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      onSelect(c.id);
    };
    el.appendChild(sw);
  });
}

// ─── ADD PROJECT ─────────────────────────────────────────
function openAddProject() {
  editingProjectId = null;
  document.getElementById('sheetTitle').textContent = 'New Project';
  document.getElementById('projName').value = '';
  document.getElementById('projDesc').value = '';
  document.getElementById('projProgress').value = 0;
  document.getElementById('projProgressVal').textContent = '0%';
  document.getElementById('projStart').value = '';
  document.getElementById('projDeadline').value = '';
  selectedColor = 'blue';
  renderColorPicker('colorPicker', selectedColor, c => { selectedColor = c; });
  // populate tab select
  const sel = document.getElementById('projTab');
  sel.innerHTML = state.tabs.map(t =>
    `<option value="${t.id}" ${t.id===state.activeTab?'selected':''}>${t.name}</option>`
  ).join('');
  document.getElementById('projectOverlay').classList.add('open');
  setTimeout(() => document.getElementById('projName').focus(), 200);
}

function openEditProject(id) {
  const p = state.projects.find(x => x.id === id);
  if (!p) return;
  editingProjectId = id;
  document.getElementById('sheetTitle').textContent = 'Edit Project';
  document.getElementById('projName').value = p.name;
  document.getElementById('projDesc').value = p.desc || '';
  document.getElementById('projProgress').value = p.progress;
  document.getElementById('projProgressVal').textContent = p.progress + '%';
  document.getElementById('projStart').value = p.start || '';
  document.getElementById('projDeadline').value = p.deadline || '';
  selectedColor = p.color || 'blue';
  renderColorPicker('colorPicker', selectedColor, c => { selectedColor = c; });
  const sel = document.getElementById('projTab');
  sel.innerHTML = state.tabs.map(t =>
    `<option value="${t.id}" ${t.id===p.tabId?'selected':''}>${t.name}</option>`
  ).join('');
  document.getElementById('projectOverlay').classList.add('open');
}

function saveProject() {
  const name = document.getElementById('projName').value.trim();
  if (!name) { document.getElementById('projName').focus(); return; }
  const tabId = document.getElementById('projTab').value || state.activeTab;
  if (editingProjectId) {
    const p = state.projects.find(x => x.id === editingProjectId);
    if (p) {
      p.name = name;
      p.desc = document.getElementById('projDesc').value.trim();
      p.progress = +document.getElementById('projProgress').value;
      p.start = document.getElementById('projStart').value || null;
      p.deadline = document.getElementById('projDeadline').value || null;
      p.color = selectedColor;
      p.tabId = tabId;
    }
  } else {
    state.projects.push({
      id: uid(),
      name,
      desc: document.getElementById('projDesc').value.trim(),
      progress: +document.getElementById('projProgress').value,
      start: document.getElementById('projStart').value || null,
      deadline: document.getElementById('projDeadline').value || null,
      color: selectedColor,
      tabId,
      archived: false,
      created: Date.now()
    });
  }
  saveState();
  closeSheet('projectOverlay');
  state.activeTab = tabId;
  render();
}

// ─── TABS ────────────────────────────────────────────────
function openNewTabSheet() {
  selectedTabColor = 'teal';
  document.getElementById('newTabName').value = '';
  renderColorPicker('tabColorPicker', selectedTabColor, c => { selectedTabColor = c; });
  document.getElementById('tabOverlay').classList.add('open');
  setTimeout(() => document.getElementById('newTabName').focus(), 200);
}

function saveNewTab() {
  const name = document.getElementById('newTabName').value.trim();
  if (!name) { document.getElementById('newTabName').focus(); return; }
  const id = 'tab_' + uid();
  state.tabs.push({ id, name, color: selectedTabColor });
  state.activeTab = id;
  saveState();
  closeSheet('tabOverlay');
  render();
}

function openEditTab(tabId) {
  editingTabId = tabId;
  const tab = state.tabs.find(t => t.id === tabId);
  if (!tab) return;
  editTabColorVal = tab.color;
  document.getElementById('editTabName').value = tab.name;
  renderColorPicker('editTabColorPicker', editTabColorVal, c => { editTabColorVal = c; });
  document.getElementById('editTabOverlay').classList.add('open');
}

function saveEditTab() {
  const tab = state.tabs.find(t => t.id === editingTabId);
  const name = document.getElementById('editTabName').value.trim();
  if (!name || !tab) return;
  tab.name = name;
  tab.color = editTabColorVal;
  saveState();
  closeSheet('editTabOverlay');
  render();
}

function deleteTab() {
  if (!confirm('Delete this tab and all its projects?')) return;
  state.projects = state.projects.filter(p => p.tabId !== editingTabId);
  state.tabs = state.tabs.filter(t => t.id !== editingTabId);
  if (state.activeTab === editingTabId) state.activeTab = 'general';
  saveState();
  closeSheet('editTabOverlay');
  render();
}

// ─── SHEET UTILS ─────────────────────────────────────────
function closeSheet(id) {
  document.getElementById(id).classList.remove('open');
}
function overlayClose(e, id) {
  if (e.target === document.getElementById(id)) closeSheet(id);
}

// ─── INIT ────────────────────────────────────────────────
render();
</script>
</body>
</html>
